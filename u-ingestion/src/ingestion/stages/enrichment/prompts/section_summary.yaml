stage: section_summary
version: "1.0"
description: >
  Generate summaries and refined keywords/entities for
  document sections. Processes sections in document order
  with progressive table of contents context.

system_prompt: >
  You are a document summarization agent for financial and
  corporate documents. Summarize each section provided and
  refine its keywords and entities from the per-unit data.
  Always use the provided tool.

user_prompt: >
  Summarize each section below and refine its keywords and
  entities from the per-unit extractions.


  {user_input}


  Rules:

  1. Summarize the key content and findings of each section
     in 2-4 sentences. Focus on data points, conclusions,
     and actionable information.

  2. For tabular or spreadsheet sections, include specific
     metric names and notable values in the summary.

  3. Refine keywords by selecting the 10-15 most
     representative terms from the per-unit keywords.
     Prioritize domain-specific and distinguishing terms.

  4. Deduplicate entities across units within the section.
     Return the canonical form of each entity.

  5. Each section summary should be self-contained and
     readable without other sections.

  6. Use the progressive table of contents to understand
     document context and avoid redundancy across sections.

tool_choice: required

tools:
  - type: function
    function:
      name: summarize_section
      description: >
        Call this tool when you have summarized all sections
        in the batch and refined their keywords and entities.
        Returns an array of items with section_id, summary,
        keywords, and entities for each section, plus a brief
        rationale for the summarization approach.
      parameters:
        type: object
        properties:
          items:
            type: array
            items:
              type: object
              properties:
                section_id:
                  type: string
                  description: >
                    Section identifier from the input.
                summary:
                  type: string
                  description: >
                    2-4 sentence summary of the section.
                    Focus on key findings, data points,
                    and conclusions.
                keywords:
                  type: array
                  items:
                    type: string
                  description: >
                    10-15 refined keywords for the section.
                    Distill from per-unit keywords,
                    prioritize the most representative
                    terms.
                entities:
                  type: array
                  items:
                    type: string
                  description: >
                    Refined entities for the section,
                    deduplicated across units within the
                    section.
              required:
                - section_id
                - summary
                - keywords
                - entities
              additionalProperties: false
            description: >
              Summary and refined metadata for each section
              in the batch.
          rationale:
            type: string
            description: >
              Brief note on summarization approach. Used
              for pipeline traceability.
        required:
          - items
          - rationale
        additionalProperties: false
