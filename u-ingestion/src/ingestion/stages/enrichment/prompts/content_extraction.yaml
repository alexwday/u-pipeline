stage: content_extraction
version: "1.0"
description: >
  Extract keywords and named entities from each content unit
  in a batch for sparse retrieval indexing.

system_prompt: >
  You are a content analysis agent for financial and
  corporate documents. Extract domain-specific keywords and
  named entities from each content unit provided. Return
  results for every unit in the batch.
  Always use the provided tool.

user_prompt: >
  Extract keywords and named entities from each content unit
  below. Each unit has an id attribute that must be returned
  in the output.


  {user_input}


  Rules:

  1. Each keyword should be 1-3 words: an acronym, metric
     name, regulatory term, or key numeric value. Examples:
     "CET1", "Tier 1", "13.7%", "TLAC", "NIM", "PCL",
     "LR2", "CR6_A". Do not create phrase-length keywords
     like "CET1 ratio movement 13.5% to 13.7%".

  2. Extract named entities: organizations, people,
     locations, regulations, financial products, and
     instruments explicitly mentioned in the content text.

  3. Keywords should be specific enough to distinguish
     this content unit from others in the same document.
     Prefer precise terms over generic ones.

  4. For tabular data, include column header terms and
     significant row labels or values as keywords.

  5. Return the exact unit id from the input for each
     item. Every unit_id in the input MUST appear in the
     output exactly once — never skip a unit and never
     repeat a unit_id. The number of items in your output
     array MUST equal the number of <unit> blocks in the
     input. If two adjacent units look similar, they are
     still separate units and must each get their own
     output entry with their own unit_id.

  6. If a unit's content is sparse, empty, or lacks
     meaningful keywords and entities, still include that
     unit in the output with empty keywords and entities
     arrays ([]). Never omit a unit from the output —
     omission is treated as a hard failure.

  7. Target 5-10 keywords per unit. Fewer keywords are
     acceptable when the content is sparse.

  8. Entities must appear in the content text. Do not tag
     entities as "(implied)" or with "?" qualifiers.

  9. Do not emit the document issuer name (e.g., "Royal
     Bank of Canada", "RBC") unless it distinguishes this
     unit from nearby units. The issuer is already captured
     in document metadata.

  10. Do not tag ubiquitous regulators (OSFI, Basel
      Committee) on every page. Include them only when
      the page specifically discusses a guideline or
      regulatory requirement.

tool_choice: required

tools:
  - type: function
    function:
      name: extract_content_metadata
      description: >
        Call this tool when you have analyzed all content
        units in the batch and extracted keywords and
        entities from each one. Returns an array of items
        with unit_id, keywords, and entities for each
        content unit, plus a brief rationale.
      parameters:
        type: object
        properties:
          items:
            type: array
            items:
              type: object
              properties:
                unit_id:
                  type: string
                  description: >
                    The content unit identifier copied
                    verbatim from the input <unit id="..."
                    attribute. Each input unit_id must
                    appear exactly once across the items
                    array — duplicates are rejected.
                keywords:
                  type: array
                  items:
                    type: string
                  description: >
                    Short atomic keywords (1-3 words each)
                    from the content. Include acronyms,
                    metric names, regulatory terms, and key
                    values. Target 5-10 keywords per unit.
                entities:
                  type: array
                  items:
                    type: string
                  description: >
                    Named entities explicitly mentioned in
                    the text. Include organizations, people,
                    locations, and regulatory references.
                    Exclude the document issuer name and
                    ubiquitous regulators.
              required:
                - unit_id
                - keywords
                - entities
              additionalProperties: false
            description: >
              Keywords and entities for each content unit
              in the batch. The array length MUST equal the
              number of input units and every input
              unit_id must appear exactly once.
          rationale:
            type: string
            description: >
              Brief note on extraction approach. Used for
              pipeline traceability.
        required:
          - items
          - rationale
        additionalProperties: false
